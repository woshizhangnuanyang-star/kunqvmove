<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>昆曲运动 · 牡丹亭体感交互 v7</title>
  <link rel="preload" as="image" href="assets/start.webp" />
  <link rel="preload" as="image" href="assets/step1.webp" />
  <link rel="prefetch" as="image" href="assets/result.webp" />
  <link rel="prefetch" as="image" href="assets/songs.webp" />
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  <link rel="preconnect" href="https://unpkg.com" crossorigin />
  <link rel="dns-prefetch" href="https://unpkg.com" />
  <style>
    :root{
      --mint:#9fe7e5;
      --mint-strong:#54d7de;
      --pink:#ef8e9e;
      --pink-strong:#e56c7a;
      --lavender:#9da8ef;
      --lavender-deep:#7f88df;
      --ink:#3e485c;
      --glass:rgba(255,255,255,.24);
      --glass-2:rgba(255,255,255,.14);
      --shadow:0 20px 40px rgba(126,153,188,.22);
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:linear-gradient(180deg,#f8fbfd,#edf3f8);
      font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
      color:var(--ink);
      user-select:none;
    }
    body{
      display:grid;
      place-items:center;
    }
    .app-shell{
      position:relative;
      width:min(100vw,160vh);
      aspect-ratio:2048/1280;
      overflow:hidden;
      border-radius:28px;
      box-shadow:0 30px 80px rgba(73,100,139,.16);
      background:#f5f7fa;
    }
    .screen{
      position:absolute;
      inset:0;
      opacity:0;
      pointer-events:none;
      transition:opacity .45s ease;
    }
    .screen.active{
      opacity:1;
      pointer-events:auto;
    }
    .bg-cover{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      pointer-events:none;
    }
    .soft-vignette{
      position:absolute;
      inset:0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,.02) 0, rgba(255,255,255,.02) 35%, rgba(255,255,255,.22) 100%),
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.06));
      pointer-events:none;
    }
    .panel{
      position:absolute;
      backdrop-filter:blur(18px);
      background:linear-gradient(180deg, rgba(255,255,255,.45), rgba(255,255,255,.16));
      border:1px solid rgba(255,255,255,.65);
      box-shadow:var(--shadow);
      border-radius:28px;
    }
    .control-button{
      appearance:none;
      border:none;
      outline:none;
      cursor:pointer;
      padding:0;
      background:transparent;
      color:inherit;
      font:inherit;
    }
    .start-hotspot{
      position:absolute;
      left:37.40%;
      top:65.47%;
      width:25.73%;
      height:9.45%;
      border-radius:999px;
      transition:transform .2s ease, box-shadow .2s ease, background .2s ease;
      background:rgba(255,255,255,.02);
      box-shadow:0 0 0 rgba(0,0,0,0);
    }
    .start-hotspot:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(139,148,218,.18);
      background:rgba(255,255,255,.08);
    }
    .start-chip{
      position:absolute;
      left:50%;
      bottom:7.8%;
      transform:translateX(-50%);
      padding:10px 18px;
      border-radius:999px;
      background:rgba(255,255,255,.5);
      color:#6a7398;
      font-size:clamp(12px,1.2vw,18px);
      border:1px solid rgba(255,255,255,.65);
      box-shadow:0 14px 32px rgba(116,127,181,.12);
    }
    .hint-pill{
      position:absolute;
      left:50%;
      top:8.2%;
      transform:translateX(-50%);
      padding:12px 28px;
      border-radius:999px;
      background:linear-gradient(180deg, rgba(255,255,255,.42), rgba(255,255,255,.18));
      backdrop-filter:blur(16px) saturate(1.02);
      border:1px solid rgba(255,255,255,.78);
      box-shadow:0 14px 32px rgba(126,153,188,.12);
      font-size:clamp(14px,1.15vw,18px);
      letter-spacing:.04em;
      color:#5a6785;
      text-align:center;
      min-width:27%;
      z-index:8;
    }
    .play-stage{
      position:absolute;
      inset:0;
      overflow:hidden;
      background:#eef2f6;
    }
    .step-frame{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      transition:opacity .6s ease, transform .65s ease, filter .65s ease;
      opacity:0;
      transform:scale(1.02);
      filter:blur(4px);
      pointer-events:none;
    }
    .step-frame.active{
      opacity:1;
      transform:translate3d(0,0,0) scale(1);
      filter:blur(0px) saturate(1.02);
    }
    .step-ghost{
      position:absolute;
      inset:0;
      background:radial-gradient(circle at 50% 56%, rgba(159,231,229,.15), transparent 26%),
                 radial-gradient(circle at 50% 56%, rgba(239,142,158,.12), transparent 42%);
      mix-blend-mode:screen;
      pointer-events:none;
      opacity:.8;
    }
    .camera-card{
      position:absolute;
      left:2.7%;
      bottom:3.4%;
      width:22%;
      aspect-ratio:4/3;
      border-radius:26px;
      overflow:hidden;
      background:linear-gradient(180deg, rgba(255,255,255,.48), rgba(255,255,255,.22));
      border:1px solid rgba(255,255,255,.7);
      backdrop-filter:blur(18px);
      box-shadow:0 20px 40px rgba(113,144,190,.16);
      z-index:9;
    }
    .camera-title{
      position:absolute;
      left:14px;
      top:12px;
      z-index:2;
      font-size:12px;
      color:#63708d;
      padding:6px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.65);
      border:1px solid rgba(255,255,255,.72);
      letter-spacing:.08em;
    }
    .camera-video, .camera-overlay{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
    }
    .camera-video{
      transform:scaleX(-1);
      opacity:.9;
      filter:saturate(1.02) contrast(1.03);
    }
    .camera-overlay{
      z-index:1;
    }
    .camera-footer{
      position:absolute;
      left:12px;
      right:12px;
      bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:8px;
      z-index:2;
    }
    .chip{
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      color:#5d6683;
      background:rgba(255,255,255,.68);
      border:1px solid rgba(255,255,255,.74);
      white-space:nowrap;
    }
    .score-chip strong{
      color:var(--pink-strong);
      font-size:14px;
      margin-left:4px;
    }
    .fx-canvas{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      z-index:6;
      pointer-events:none;
      mix-blend-mode:screen;
    }
    .hud{
      position:absolute;
      inset:0;
      z-index:7;
      pointer-events:none;
    }
    .status-card{
      position:absolute;
      top:24.0%;
      left:3.1%;
      width:21.2%;
      min-height:16%;
      padding:16px 18px 14px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.56), rgba(255,255,255,.18));
      border:1px solid rgba(255,255,255,.72);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
    }
    .status-title{
      font-size:12px;
      letter-spacing:.12em;
      color:#707a98;
      margin-bottom:10px;
    }
    .step-name{
      font-size:clamp(20px,2vw,30px);
      font-weight:700;
      color:var(--pink-strong);
      line-height:1.15;
    }
    .step-lyric{
      margin-top:6px;
      font-size:clamp(12px,1.15vw,16px);
      color:#74809e;
      line-height:1.4;
    }
    .progress-shell{
      position:absolute;
      top:4.5%;
      right:3.1%;
      width:22%;
      padding:14px 18px 16px;
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.58), rgba(255,255,255,.18));
      border:1px solid rgba(255,255,255,.72);
      backdrop-filter:blur(16px);
      box-shadow:var(--shadow);
      text-align:right;
    }
    .progress-label{
      font-size:12px;
      color:#707a98;
      letter-spacing:.08em;
      text-align:left;
    }
    .progress-value{
      margin-top:8px;
      font-size:clamp(28px,3vw,42px);
      font-weight:800;
      color:var(--pink-strong);
      line-height:1;
    }
    .bar-wrap{
      margin-top:12px;
      width:100%;
      height:12px;
      border-radius:999px;
      overflow:hidden;
      background:rgba(255,255,255,.75);
      border:1px solid rgba(255,255,255,.84);
      box-shadow:inset 0 1px 4px rgba(112,124,159,.08);
    }
    .bar-fill{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg, var(--mint), var(--lavender), var(--pink));
      transition:width .16s ease;
    }
    .meter-row{
      margin-top:10px;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-end;
      font-size:12px;
      color:#74809e;
    }
    .hold-ring{
      position:absolute;
      left:50%;
      top:55.7%;
      width:min(25vw,25vh);
      aspect-ratio:1/1;
      transform:translate(-50%,-50%);
      border-radius:50%;
      pointer-events:none;
      border:2px solid rgba(159,231,229,.4);
      box-shadow:
        0 0 0 10px rgba(159,231,229,.08),
        0 0 50px rgba(159,231,229,.18),
        inset 0 0 40px rgba(255,255,255,.06);
      z-index:5;
      overflow:hidden;
    }
    .hold-ring::after{
      content:"";
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        conic-gradient(from -90deg, rgba(159,231,229,.9) calc(var(--hold,0) * 1%), rgba(255,255,255,.06) 0),
        radial-gradient(circle at 50% 50%, rgba(159,231,229,.08), rgba(255,255,255,0) 63%);
      mask:radial-gradient(circle at 50% 50%, transparent 70%, black 71%);
    }
    .pulse-stage{
      position:absolute;
      left:50%;
      top:55.7%;
      width:min(33vw,33vh);
      aspect-ratio:1/1;
      transform:translate(-50%,-50%) scale(var(--pulse,1));
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(159,231,229,.22) 0, rgba(159,231,229,.12) 38%, rgba(255,255,255,0) 70%);
      filter:blur(5px);
      opacity:.8;
      z-index:4;
      pointer-events:none;
      transition:transform .18s ease, opacity .2s ease;
    }
    .peony-track{
      position:absolute;
      inset:0;
      z-index:8;
      pointer-events:none;
    }
    .peony{
      position:absolute;
      width:min(6.2vw,82px);
      aspect-ratio:285/281;
      transform:translate(-50%,-50%);
      transition:filter .28s ease;
      will-change:transform,filter;
    }
    .peony-bloom{
      position:absolute;
      left:50%;
      top:50%;
      width:160%;
      aspect-ratio:1/1;
      transform:translate(-50%,-50%) scale(.66);
      border-radius:50%;
      background:radial-gradient(circle, rgba(127,136,223,.44) 0, rgba(127,136,223,.18) 28%, rgba(127,136,223,.08) 48%, rgba(255,255,255,0) 74%);
      filter:blur(12px);
      opacity:0;
      transition:opacity .28s ease, transform .42s cubic-bezier(.2,.78,.2,1);
      pointer-events:none;
    }
    .peony-bloom::after{
      content:"";
      position:absolute;
      inset:16%;
      border-radius:50%;
      border:2px solid rgba(157,168,239,.34);
      transform:scale(.78);
      opacity:0;
    }
    .peony-img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:contain;
      filter:drop-shadow(0 10px 16px rgba(135,151,207,.10));
      transition:opacity .25s ease, transform .36s cubic-bezier(.2,.78,.2,1), filter .28s ease;
    }
    .peony-img--active{
      opacity:0;
      transform:scale(.84);
      filter:drop-shadow(0 16px 24px rgba(127,136,223,.18));
    }
    .peony.active{
      filter:drop-shadow(0 14px 28px rgba(127,136,223,.18));
    }
    .peony.active .peony-bloom{
      opacity:1;
      transform:translate(-50%,-50%) scale(1.08);
    }
    .peony.active .peony-bloom::after{
      animation:bloomRing .65s ease-out both;
    }
    .peony.active .peony-img--active{
      opacity:1;
      transform:scale(1.06);
      filter:drop-shadow(0 18px 30px rgba(127,136,223,.28));
    }
    .peony.pop .peony-bloom{
      animation:bloomPulse .68s cubic-bezier(.18,.82,.2,1) both;
    }
    .peony.pop .peony-img--active{
      animation:bloomFlower .68s cubic-bezier(.18,.82,.2,1) both;
    }
    @keyframes bloomPulse{
      0%{opacity:0; transform:translate(-50%,-50%) scale(.52);}
      48%{opacity:1; transform:translate(-50%,-50%) scale(1.34);}
      100%{opacity:1; transform:translate(-50%,-50%) scale(1.08);}
    }
    @keyframes bloomFlower{
      0%{opacity:0; transform:scale(.7);}
      46%{opacity:1; transform:scale(1.18);}
      100%{opacity:1; transform:scale(1.06);}
    }
    @keyframes bloomRing{
      0%{opacity:0; transform:scale(.62);}
      45%{opacity:.8; transform:scale(1.12);}
      100%{opacity:0; transform:scale(1.34);}
    }
    .footer-tip{
      position:absolute;
      left:50%;
      bottom:2.2%;
      transform:translateX(-50%);
      z-index:8;
      padding:8px 16px;
      border-radius:999px;
      background:rgba(255,255,255,.5);
      color:#6a7591;
      font-size:12px;
      border:1px solid rgba(255,255,255,.68);
      box-shadow:0 8px 20px rgba(121,135,176,.08);
    }
    .result-overlay{
      position:absolute;
      inset:0;
      z-index:4;
      pointer-events:none;
    }
    .result-score{
      position:absolute;
      left:12.6%;
      top:32.2%;
      width:31.7%;
      height:10.8%;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      font-size:clamp(46px,5.5vw,82px);
      font-weight:800;
      letter-spacing:.02em;
      color:var(--pink-strong);
      text-shadow:0 10px 28px rgba(229,108,122,.12);
    }
    .result-best{
      position:absolute;
      left:14.0%;
      top:47.7%;
      font-size:clamp(15px,1.2vw,18px);
      color:#7380a1;
      text-shadow:0 8px 20px rgba(255,255,255,.45);
    }
    .rank-chip{
      position:absolute;
      left:6.7%;
      top:68.9%;
      width:10.6%;
      aspect-ratio:1.13/1;
      height:8.8%;
      display:grid;
      place-items:center;
      color:var(--pink-strong);
      font-size:clamp(36px,4vw,56px);
      font-weight:900;
      letter-spacing:.02em;
      filter:drop-shadow(0 12px 20px rgba(126,136,223,.12));
    }
    .stats-grid{
      position:absolute;
      left:13.5%;
      top:55.0%;
      display:grid;
      width:28.8%;
      grid-template-columns:repeat(5, minmax(0, 1fr));
      gap:27px;
      align-items:end;
      text-align:center;
      color:#8b96b5;
      font-size:0;
    }
    .stats-grid strong{
      display:block;
      color:#6f7b97;
      font-size:clamp(18px,1.52vw,24px);
      line-height:1;
      margin-top:0;
      letter-spacing:.01em;
    }
    .result-btn{
      position:absolute;
      z-index:7;
      pointer-events:auto;
      cursor:pointer;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.02);
      box-shadow:0 0 0 rgba(0,0,0,0);
      backdrop-filter:blur(1px);
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .result-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.06);
      box-shadow:0 18px 34px rgba(125,136,224,.16);
    }
    .result-btn.retry{
      left:55.95%;
      top:70.25%;
      width:17.95%;
      height:7.65%;
    }
    .result-btn.songs{
      left:76.17%;
      top:70.25%;
      width:17.9%;
      height:7.65%;
    }
    .song-overlay{
      position:absolute;
      inset:0;
      z-index:4;
    }
    .song-back{
      position:absolute;
      left:2.25%;
      top:3.95%;
      width:5.8%;
      aspect-ratio:1/1;
      border-radius:50%;
      border:none;
      background:rgba(160,232,229,.86);
      box-shadow:0 16px 26px rgba(123,175,178,.18);
      color:#4d5770;
      font-size:clamp(22px,2vw,36px);
      cursor:pointer;
      pointer-events:auto;
      transition:transform .18s ease;
    }
    .song-back:hover{ transform:translateX(-2px);}
    .song-card{
      position:absolute;
      border-radius:50%;
      cursor:pointer;
      pointer-events:auto;
      transition:transform .22s ease, box-shadow .22s ease, filter .22s ease, background .22s ease;
      box-shadow:0 0 0 rgba(0,0,0,0);
      background:rgba(255,255,255,.02);
    }
    .song-card.hovered{
      transform:scale(1.03);
      box-shadow:0 22px 38px rgba(150,168,223,.12);
      background:rgba(255,255,255,.04);
      filter:saturate(1.04);
    }
    .song-card .hold-outline{
      position:absolute;
      inset:-6px;
      border-radius:50%;
      border:3px solid rgba(157,168,239,.16);
      background:conic-gradient(from -90deg, rgba(157,168,239,.82) calc(var(--song-hold, 0) * 1%), rgba(255,255,255,0) 0);
      mask:radial-gradient(circle, transparent 71%, black 73%);
      pointer-events:none;
      opacity:.95;
    }
    .song-exit{
      position:absolute;
      left:80.71%;
      top:90.0%;
      width:16.21%;
      height:7.58%;
      border:none;
      border-radius:999px;
      background:rgba(255,255,255,.02);
      box-shadow:0 0 0 rgba(0,0,0,0);
      cursor:pointer;
      z-index:7;
      transition:transform .18s ease, box-shadow .18s ease, background .18s ease;
    }
    .song-exit:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.04);
      box-shadow:0 16px 28px rgba(125,136,224,.12);
    }
    .song-cursor{
      position:absolute;
      z-index:8;
      width:24px;
      height:24px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 35%, #fff, var(--mint) 62%, var(--lavender) 100%);
      box-shadow:0 0 0 12px rgba(159,231,229,.18), 0 0 30px rgba(159,231,229,.42);
      pointer-events:none;
      transform:translate(-50%,-50%);
      opacity:0;
      transition:opacity .15s ease;
    }
    .toast{
      position:absolute;
      left:50%;
      bottom:4.5%;
      transform:translateX(-50%) translateY(20px);
      z-index:11;
      padding:12px 22px;
      border-radius:999px;
      background:rgba(255,255,255,.76);
      border:1px solid rgba(255,255,255,.84);
      backdrop-filter:blur(16px);
      box-shadow:0 16px 30px rgba(125,136,224,.12);
      color:#6a7395;
      font-size:14px;
      opacity:0;
      transition:opacity .25s ease, transform .25s ease;
      pointer-events:none;
    }
    .toast.show{
      opacity:1;
      transform:translateX(-50%) translateY(0);
    }
    .loading{
      position:absolute;
      inset:0;
      display:grid;
      place-items:center;
      z-index:20;
      background:rgba(242,246,250,.72);
      backdrop-filter:blur(10px);
      color:#62708c;
      font-size:clamp(16px,1.5vw,22px);
      letter-spacing:.08em;
    }
    .loading.hidden{ display:none; }
    .tiny{
      font-size:12px;
      color:#8a95b2;
    }
    @media (max-width:900px){
      .app-shell{
        border-radius:18px;
        box-shadow:0 16px 42px rgba(73,100,139,.13);
      }
      .camera-card{
        width:17.8%;
        border-radius:18px;
        left:2.1%;
        bottom:2.5%;
      }
      .status-card{
        width:18.6%;
        min-height:12%;
        padding:10px 12px;
        border-radius:18px;
        top:25.2%;
      }
      .progress-shell{
        width:19.5%;
        padding:10px 12px 11px;
        border-radius:18px;
      }
      .hint-pill{
        transform:translateX(-50%) scale(.86);
        transform-origin:center top;
        padding:8px 18px;
      }
      .footer-tip{
        transform:translateX(-50%) scale(.86);
        transform-origin:center bottom;
      }
      .song-card{
        transform:scale(.84);
        transform-origin:center;
      }
      .song-card.hovered{
        transform:scale(.88);
      }
      .song-exit{
        width:14.8%;
        height:6.6%;
      }
      .ghost-btn{ min-width:150px; padding:14px 22px; }
    }
    @media (max-width:700px) and (orientation:portrait){
      html,body{
        overflow:auto;
        min-height:100%;
        background:#f7fafc;
      }
      body{
        display:flex;
        align-items:flex-start;
        justify-content:center;
      }
      .app-shell{

      state.screen = name;
      Object.entries(screens).forEach(([key, el]) => {
        el.classList.toggle("active", key === name);
      });
    }

    function showLoading(show, text){
      loadingMask.classList.toggle("hidden", !show);

      toast.classList.add("show");
      clearTimeout(state.toastTimer);
      state.toastTimer = setTimeout(()=>toast.classList.remove("show"), 1800);
    }

    function buildPeonies(){
      const track = $("peonyTrack");
      track.innerHTML = "";
      STEP_DATA.forEach((_, index) => {
        const pos = PEONY_LAYOUT[index] || {x:50,y:80};
        const node = document.createElement("div");
        node.className = "peony";
        node.dataset.index = index;
        node.style.left = `${pos.x}%`;
        node.style.top = `${pos.y}%`;
        node.innerHTML = `
          <div class="peony-bloom"></div>
          <img class="peony-img peony-img--base" src="assets/peony-icon.png" alt="" />
          <img class="peony-img peony-img--active" src="assets/peony-icon-purple.png" alt="" />
        `;
        track.appendChild(node);
      });
    }

    function triggerPeonyBloom(index){
      const node = $("peonyTrack").children[index];
      if(!node) return;
      node.classList.add("pop");
      setTimeout(()=>node.classList.remove("pop"), 720);
    }

    function refreshPeonies(){
      [...$("peonyTrack").children].forEach((node, index) => {
        const active = index < state.stepCompleted.length;
        node.classList.toggle("active", active);
      });
    }

    function buildSongs(){

      songLayer.innerHTML = "";
      SONG_DATA.forEach((song) => {
        const btn = document.createElement("button");
        btn.className = "control-button song-card";
        btn.dataset.id = song.id;
        btn.dataset.title = song.title;
        btn.style.left = `${song.x - song.size/2}%`;
        btn.style.top = `${song.y - song.size/2}%`;
        btn.style.width = `${song.size}%`;
        btn.style.height = `${song.size}%`;
        btn.innerHTML = `<div class="hold-outline"></div>`;
        btn.addEventListener("mouseenter", ()=> setHoveredSong(song.id));
        btn.addEventListener("mouseleave", ()=> clearHoveredSong(song.id));
        btn.addEventListener("click", ()=> selectSong(song.id));
        songLayer.appendChild(btn);
      });
    }

    function setHoveredSong(id){
      state.hoveredSong = id;
      state.hoveredSongProgress = 0;
      state.hoveredSongSince = performance.now();
      updateSongCards();
    }

    function clearHoveredSong(id){
      if(state.hoveredSong === id){
        state.hoveredSong = null;
        state.hoveredSongProgress = 0;
        updateSongCards();
      }
    }

    function updateSongCards(){
      [...songLayer.children].forEach((node) => {
        const hovered = node.dataset.id === state.hoveredSong;
        node.classList.toggle("hovered", hovered);
        const outline = node.querySelector(".hold-outline");
        outline.style.setProperty("--song-hold", hovered ? state.hoveredSongProgress.toFixed(1) : 0);
      });
    }

    function selectSong(id){
      const song = SONG_DATA.find(s => s.id === id);
      if(!song) return;
      if(song.enabled){
        state.currentSong = song.id === "mudanting" ? "牡丹亭游园·皂罗袍" : song.title;
        songChip.textContent = `当前曲目：${state.currentSong}`;

        resetGame();
        showScreen("start");
      }else{
        showToast(`${song.title} 交互骨架已预留，可继续扩展`);
      }
    }

      if(score >= 760000) return "EX";
      if(score >= 620000) return "SS";
      if(score >= 500000) return "S";
      if(score >= 360000) return "A";
      if(score >= 240000) return "B";
      return "C";
    }

        ["MARV.", state.perfect],
        ["EXCL.", state.excellent],
        ["GOOD", state.good],
        ["FAIR", state.fair],
        ["MISS", state.miss]
      ];
      statsGrid.innerHTML = stats.map(([, value]) => `<div><strong>${value}</strong></div>`).join("");

    function setFrame(src, immediate = false){
      const incoming = state.frameToggle ? stepFrameA : stepFrameB;
      const outgoing = state.frameToggle ? stepFrameB : stepFrameA;
      const dirX = (state.currentStep % 2 === 0 ? 18 : -18);
      const dirY = (state.currentStep % 3 === 0 ? 10 : -10);
      incoming.src = src;
      incoming.style.transition = immediate ? "none" : "opacity .52s cubic-bezier(.22,.8,.2,1), transform .68s cubic-bezier(.22,.8,.2,1), filter .52s ease";
      outgoing.style.transition = immediate ? "none" : "opacity .46s ease, transform .58s cubic-bezier(.22,.8,.2,1), filter .46s ease";
      incoming.style.transform = `translate3d(${dirX}px, ${dirY}px, 0) scale(1.032)`;
      incoming.style.filter = "blur(3px) saturate(.98)";
      incoming.style.opacity = "0";
      incoming.classList.add("active");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          incoming.style.transform = "translate3d(0,0,0) scale(1)";
          incoming.style.filter = "blur(0px) saturate(1.02)";
          incoming.style.opacity = "1";
          outgoing.style.opacity = "0";
          outgoing.style.transform = `translate3d(${-dirX * 0.55}px, ${-dirY * 0.45}px, 0) scale(.988)`;
          outgoing.style.filter = immediate ? "blur(0px)" : "blur(2.5px) saturate(.98)";
          setTimeout(() => {
            outgoing.classList.remove("active");
            outgoing.style.transform = "";
            outgoing.style.filter = "";
            outgoing.style.opacity = "";
            if(immediate){
              incoming.style.transition = "";
              outgoing.style.transition = "";
            }
          }, immediate ? 0 : 700);
        });
      });
      state.frameToggle = !state.frameToggle;
    }

    function resizeCanvases(){

      const dpr = Math.min(window.devicePixelRatio || 1, isCompactDevice() ? 1.15 : 1.6);

      const camRect = cameraOverlay.getBoundingClientRect();
      cameraOverlay.width = Math.max(1, Math.floor(camRect.width * dpr));
      cameraOverlay.height = Math.max(1, Math.floor(camRect.height * dpr));
      cameraCtx.setTransform(dpr, 0, 0, dpr, 0, 0);

      const fxRect = fxCanvas.getBoundingClientRect();
      fxCanvas.width = Math.max(1, Math.floor(fxRect.width * dpr));
      fxCanvas.height = Math.max(1, Math.floor(fxRect.height * dpr));
      fxCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function clearCanvases(){
      const camRect = cameraOverlay.getBoundingClientRect();
      const fxRect = fxCanvas.getBoundingClientRect();
      cameraCtx.clearRect(0,0,camRect.width,camRect.height);
      fxCtx.clearRect(0,0,fxRect.width,fxRect.height);
    }

    function midpoint(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }
    function distance(a,b){ return Math.hypot(a.x - b.x, a.y - b.y); }
    function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }

    function getKeypointsByName(pose){
      const out = {};
      const points = pose.keypoints || [];
      points.forEach(k => {
        if(k.name) out[k.name] = k;
      });
      return out;
    }

    function normalizePose(keypoints){
      const ls = keypoints.left_shoulder;
      const rs = keypoints.right_shoulder;
      const lh = keypoints.left_hip;
      const rh = keypoints.right_hip;
      if(!(ls && rs && lh && rh)) return null;
      const centerShoulder = midpoint(ls, rs);
      const centerHip = midpoint(lh, rh);
      const scale = Math.max(distance(centerShoulder, centerHip), distance(ls, rs) * .9, 60);
      const ref = { x:centerShoulder.x, y:centerShoulder.y };
      const names = ["nose","left_wrist","right_wrist","left_elbow","right_elbow","left_hip","right_hip","left_knee","right_knee"];
      const map = {};
      names.forEach(name => {
        const p = keypoints[name];
        if(p && (p.score == null || p.score > 0.22)){
          map[name] = {
            x:(p.x - ref.x)/scale,
            y:(p.y - ref.y)/scale,
            score:p.score ?? 1
          };
        }
      });
      return map;
    }

    function evaluatePose(pose, target){
      const named = getKeypointsByName(pose);
      const norm = normalizePose(named);
      if(!norm) return {score:0, confidence:0, wrists:null};
      let totalWeight = 0;
      let totalLoss = 0;
      Object.entries(target).forEach(([rawName, desired]) => {
        const name = rawName
          .replace(/[A-Z]/g, (m)=>"_" + m.toLowerCase())
          .replace(/^_/,"");
        const kp = norm[name];
        if(!kp) return;
        const dx = kp.x - desired.x;
        const dy = kp.y - desired.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const weight = desired.w || 1;
        totalLoss += dist * weight;
        totalWeight += weight;
      });
      const avgLoss = totalWeight ? totalLoss / totalWeight : 10;
      let score = 100 - avgLoss * 52;
      const ls = norm.left_shoulder, rs = norm.right_shoulder, lw = norm.left_wrist, rw = norm.right_wrist;
      if(ls && rs && lw && rw){
        const width = Math.abs(rs.x - ls.x) || .8;
        const openness = Math.abs(rw.x - lw.x) / width;
        score += clamp((openness - 1.1) * 4, -4, 8);
      }
      score = clamp(score, 0, 100);

      return {
        score,
        confidence:clamp(1 - avgLoss / 3, 0, 1),
        wrists:{
          left:named.left_wrist,
          right:named.right_wrist
        }
      };
    }

    const skeletonConnections = [
      ["left_shoulder","right_shoulder"],
      ["left_shoulder","left_elbow"],
      ["left_elbow","left_wrist"],
      ["right_shoulder","right_elbow"],
      ["right_elbow","right_wrist"],
      ["left_shoulder","left_hip"],
      ["right_shoulder","right_hip"],
      ["left_hip","right_hip"],
      ["left_hip","left_knee"],
      ["right_hip","right_knee"]
    ];

    function drawCameraOverlay(pose){
      const rect = cameraOverlay.getBoundingClientRect();
      cameraCtx.clearRect(0,0,rect.width,rect.height);
      if(!pose) return;
      const named = getKeypointsByName(pose);
      cameraCtx.save();
      cameraCtx.lineWidth = 3;
      cameraCtx.strokeStyle = "rgba(159,231,229,.95)";
      cameraCtx.fillStyle = "rgba(239,142,158,.95)";
      skeletonConnections.forEach(([a,b]) => {
        const p1 = named[a], p2 = named[b];
        if(!(p1 && p2)) return;
        if((p1.score ?? 1) < .22 || (p2.score ?? 1) < .22) return;
        const x1 = rect.width - (p1.x / cameraVideo.videoWidth) * rect.width;
        const y1 = (p1.y / cameraVideo.videoHeight) * rect.height;
        const x2 = rect.width - (p2.x / cameraVideo.videoWidth) * rect.width;
        const y2 = (p2.y / cameraVideo.videoHeight) * rect.height;
        cameraCtx.beginPath();
        cameraCtx.moveTo(x1,y1);
        cameraCtx.lineTo(x2,y2);
        cameraCtx.stroke();
      });
      Object.values(named).forEach(p => {
        if((p.score ?? 1) < .24) return;
        const x = rect.width - (p.x / cameraVideo.videoWidth) * rect.width;
        const y = (p.y / cameraVideo.videoHeight) * rect.height;
        cameraCtx.beginPath();
        cameraCtx.arc(x,y,4.8,0,Math.PI*2);
        cameraCtx.fill();
      });
      cameraCtx.restore();
    }

    function pushTrailPoint(point, color){
      if(!point || !cameraVideo.videoWidth) return;
      const rect = fxCanvas.getBoundingClientRect();
      const x = rect.width - (point.x / cameraVideo.videoWidth) * rect.width;
      const y = (point.y / cameraVideo.videoHeight) * rect.height;
      state.fxTrails.push({
        x, y,
        color,
        life:1,
        radius:18 + Math.random()*14
      });
      if(state.fxTrails.length > 42) state.fxTrails.shift();
    }

    const VISION_SCRIPT_GROUPS = {
      core: [
        "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js",
        "https://unpkg.com/@tensorflow/tfjs-core@4.22.0/dist/tf-core.min.js"
      ],
      converter: [
        "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js",
        "https://unpkg.com/@tensorflow/tfjs-converter@4.22.0/dist/tf-converter.min.js"
      ],
      webgl: [
        "https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js",
        "https://unpkg.com/@tensorflow/tfjs-backend-webgl@4.22.0/dist/tf-backend-webgl.min.js"
      ],
      pose: [
        "https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js",
        "https://unpkg.com/@tensorflow-models/pose-detection@2.1.0/dist/pose-detection.min.js"
      ],
      hands: [
        "https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js",
        "https://unpkg.com/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js"
      ]
    };
    const scriptPromises = {};
    function loadScriptGroup(key){
      if(scriptPromises[key]) return scriptPromises[key];
      const sources = VISION_SCRIPT_GROUPS[key];
      scriptPromises[key] = new Promise((resolve, reject) => {
        let index = 0;
        const tryLoad = () => {
          const src = sources[index++];
          if(!src){
            reject(new Error(`runtime script load failed: ${key}`));
            return;
          }
          const script = document.createElement("script");
          script.src = src;
          script.async = true;
          script.crossOrigin = "anonymous";
          script.onload = resolve;
          script.onerror = () => {
            script.remove();
            tryLoad();
          };
          document.head.appendChild(script);
        };
        tryLoad();
      });
      return scriptPromises[key];
    }
    async function ensureVisionRuntime(needsHands = false){
      if(!(window.tf && window.poseDetection)){
        await loadScriptGroup("core");
        await loadScriptGroup("converter");
        await loadScriptGroup("webgl");
        await loadScriptGroup("pose");
      }
      if(needsHands && !window.handPoseDetection){
        await loadScriptGroup("hands");
      }
    }

    function drawFx(){
      const rect = fxCanvas.getBoundingClientRect();
      fxCtx.clearRect(0,0,rect.width,rect.height);

      const stageGlow = fxCtx.createRadialGradient(rect.width*.5, rect.height*.56, rect.width*.04, rect.width*.5, rect.height*.56, rect.width*.18);
      stageGlow.addColorStop(0, `rgba(159,231,229,${0.08 + state.liveScore/900})`);
      stageGlow.addColorStop(.55, `rgba(157,168,239,${0.05 + state.liveScore/1300})`);
      stageGlow.addColorStop(1, "rgba(255,255,255,0)");
      fxCtx.fillStyle = stageGlow;
      fxCtx.beginPath();
      fxCtx.arc(rect.width*.5, rect.height*.56, rect.width*.18, 0, Math.PI*2);
      fxCtx.fill();

      state.fxTrails.forEach((trail) => {
        fxCtx.save();
        fxCtx.globalAlpha = trail.life * .55;
        const grad = fxCtx.createRadialGradient(trail.x, trail.y, 0, trail.x, trail.y, trail.radius);
        grad.addColorStop(0, trail.color);
        grad.addColorStop(.6, trail.color.replace("1)", ".18)"));
        grad.addColorStop(1, "rgba(255,255,255,0)");
        fxCtx.fillStyle = grad;
        fxCtx.beginPath();
        fxCtx.arc(trail.x, trail.y, trail.radius, 0, Math.PI*2);
        fxCtx.fill();
        fxCtx.restore();
        trail.life -= .04;
      });
      state.fxTrails = state.fxTrails.filter(t => t.life > 0);
    }

    async function initDetectors(mode = "pose"){
      const needsHands = mode === "hands" || mode === "all";
      if(state.poseDetector && (!needsHands || state.handDetector)) return;
      showLoading(true, needsHands ? "正在唤醒切歌识别…" : "正在快速唤醒体感引擎…");
      try{
        await ensureVisionRuntime(needsHands);
        await tf.setBackend("webgl");
        await tf.ready();
        if(!state.poseDetector){
          state.poseDetector = await poseDetection.createDetector(
            poseDetection.SupportedModels.MoveNet,
            {
              modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING,
              enableSmoothing: true
            }
          );
        }
        if(needsHands && !state.handDetector){
          state.handDetector = await handPoseDetection.createDetector(
            handPoseDetection.SupportedModels.MediaPipeHands,
            {
              runtime: "tfjs",
              modelType: "lite",
              maxHands: 1
            }
          );
        }
      }catch(err){
        console.error(err);
        showToast("体感模型加载失败，请检查网络后重试");
        throw err;
      }finally{
        showLoading(false);
      }
    }

    async function ensureCamera(){
      if(state.stream) return;
      const compact = isCompactDevice();
      const stream = await navigator.mediaDevices.getUserMedia({
        video:{
          width:{ideal: compact ? 960 : 1280},
          height:{ideal: compact ? 540 : 720},
          facingMode:"user"
        },
        audio:false
      });
      state.stream = stream;
      cameraVideo.srcObject = stream;
      await cameraVideo.play();
      resizeCanvases();
    }

    function stopLoop(){
      if(state.loopId) cancelAnimationFrame(state.loopId);
      state.loopId = 0;
    }

    async function startSession(){
      try{
        await initDetectors("pose");
        await ensureCamera();
        resetGame();
        showScreen("play");
        state.prevTs = 0;
        stopLoop();
        state.loopId = requestAnimationFrame(loop);
      }catch(err){
        console.error(err);
      }
    }

    function finishGame(){
      updateResult();
      showScreen("result");
    }

    function classifyHit(score){
      if(score >= 92) return "perfect";
      if(score >= 84) return "excellent";
      if(score >= 72) return "good";
      if(score >= 56) return "fair";
      return "miss";
    }

    function registerHit(score){
      const hit = classifyHit(score);
      if(hit === "perfect") state.perfect += 1;
      else if(hit === "excellent") state.excellent += 1;
      else if(hit === "good") state.good += 1;
      else if(hit === "fair") state.fair += 1;
      else state.miss += 1;
    }

    function completeCurrentStep(){
      const stepScore = Math.round(18000 + state.liveScore * 820 + state.combo * 120);
      state.totalScore += stepScore;
      totalScoreEl.textContent = state.totalScore.toLocaleString("en-US");
      state.combo += 1;
      comboText.textContent = String(state.combo);
      state.stepCompleted.push(state.currentStep);
      refreshPeonies();
      triggerPeonyBloom(state.currentStep);
      registerHit(state.liveScore);
      pushTrailPoint({x:cameraVideo.videoWidth*0.5, y:cameraVideo.videoHeight*0.56}, "rgba(255,255,255,1)");
      state.holdProgress = 0;
      holdRing.style.setProperty("--hold", "0");
      pulseStage.style.setProperty("--pulse", "1.07");
      setTimeout(()=>pulseStage.style.setProperty("--pulse", "1"), 180);

      if(state.currentStep >= STEP_DATA.length - 1){
        setTimeout(finishGame, 600);
        return;
      }
      state.currentStep += 1;
      syncStepUi();
      setFrame(STEP_DATA[state.currentStep].frame);
      showToast(`已解锁第 ${state.currentStep + 1} 式`);
    }

    async function detectPlayFrame(ts){
      const interval = isCompactDevice() ? 74 : 58;
      if(ts - state.lastPoseDetectTs < interval) return;
      state.lastPoseDetectTs = ts;
      if(state.detecting) return;
      if(!state.poseDetector || !cameraVideo.videoWidth) return;
      state.detecting = true;
      try{
        const poses = await state.poseDetector.estimatePoses(cameraVideo, {
          maxPoses:1,
          flipHorizontal:true
        });
        const pose = poses && poses[0];
        drawCameraOverlay(pose);
        if(!pose){
          state.poseVisible = false;
          state.liveScore = Math.max(0, state.liveScore - .9);
          cameraState.textContent = "请进入镜头";
          holdText.textContent = "稳定保持 0%";
          scoreBar.style.width = `${state.liveScore}%`;
          liveScoreEl.textContent = String(Math.round(state.liveScore));
          return;
        }

        state.poseVisible = true;
        const { score, confidence, wrists } = evaluatePose(pose, STEP_DATA[state.currentStep].target);
        state.liveScore = state.liveScore * .72 + score * .28;
        liveScoreEl.textContent = String(Math.round(state.liveScore));
        scoreBar.style.width = `${state.liveScore}%`;

        const dt = state.prevTs ? (ts - state.prevTs) : 16;
        if(state.liveScore >= 76 && confidence > .3){
          state.holdProgress = clamp(state.holdProgress + dt / 850, 0, 100);
          cameraState.textContent = "命中稳定";
        }else{
          state.holdProgress = clamp(state.holdProgress - dt / 1700, 0, 100);
          cameraState.textContent = "继续调整";
        }

        holdRing.style.setProperty("--hold", state.holdProgress.toFixed(2));
        holdText.textContent = `稳定保持 ${Math.round(state.holdProgress)}%`;
        pulseStage.style.setProperty("--pulse", (1 + state.liveScore / 1000).toFixed(3));

        if(wrists){
          pushTrailPoint(wrists.left, "rgba(159,231,229,1)");
          pushTrailPoint(wrists.right, "rgba(239,142,158,1)");
        }

        if(state.holdProgress >= 100){
          completeCurrentStep();
        }
      }catch(err){
        console.error(err);
        cameraState.textContent = "识别中断";
      }finally{
        state.detecting = false;
      }
    }

    function processSongHands(hands, ts){
      if(!hands || !hands.length){
        songCursor.style.opacity = 0;
        state.hoveredSong = null;
        state.hoveredSongProgress = 0;
        updateSongCards();
        return;
      }
      const hand = hands[0];
      const points = hand.keypoints || [];
      const finger = points.find(p => p.name === "index_finger_tip") || points[8];
      const thumb = points.find(p => p.name === "thumb_tip") || points[4];
      if(!finger) return;

      const rect = fxCanvas.getBoundingClientRect();
      const x = rect.width - (finger.x / cameraVideo.videoWidth) * rect.width;
      const y = (finger.y / cameraVideo.videoHeight) * rect.height;
      songCursor.style.opacity = .98;
      songCursor.style.left = `${x}px`;
      songCursor.style.top = `${y}px`;

      let hovered = null;
      SONG_DATA.forEach(song => {
        const cx = rect.width * (song.x / 100);
        const cy = rect.height * (song.y / 100);
        const r = rect.width * (song.size / 100) * .47;
        if(Math.hypot(x - cx, y - cy) <= r){
          hovered = song.id;
        }
      });

      const pinching = thumb ? Math.hypot(finger.x - thumb.x, finger.y - thumb.y) < 24 : false;

      if(hovered !== state.hoveredSong){
        state.hoveredSong = hovered;
        state.hoveredSongProgress = 0;
        state.hoveredSongSince = ts;
      }else if(hovered){
        const held = ts - state.hoveredSongSince;
        state.hoveredSongProgress = clamp((held / 760) * 100, 0, 100);
        if(state.hoveredSongProgress >= 100 || pinching){
          const selected = hovered;
          state.hoveredSong = null;
          state.hoveredSongProgress = 0;
          updateSongCards();
          selectSong(selected);
        }
      }else{
        state.hoveredSongProgress = 0;
      }
      updateSongCards();
    }

    async function detectSongFrame(ts){
      const interval = isCompactDevice() ? 86 : 70;
      if(ts - state.lastHandDetectTs < interval) return;
      state.lastHandDetectTs = ts;
      if(state.detecting) return;
      if(!state.handDetector || !cameraVideo.videoWidth) return;
      state.detecting = true;
      try{
        const hands = await state.handDetector.estimateHands(cameraVideo, {
          flipHorizontal:true
        });
        processSongHands(hands, ts);
      }catch(err){
        console.error(err);
      }finally{
        state.detecting = false;
      }
    }

    function loop(ts){
      state.loopId = requestAnimationFrame(loop);
      if(state.screen === "play"){
        detectPlayFrame(ts);
      }else if(state.screen === "songs"){
        detectSongFrame(ts);
      }else{
        // keep cursor hidden on non-song screens
        songCursor.style.opacity = 0;
      }
      state.prevTs = ts;
      drawFx();
    }

    startBtn.addEventListener("click", startSession);
    retryBtn.addEventListener("click", startSession);
    screens.play.addEventListener("click", () => {
      if(state.screen === "play") completeCurrentStep();
    });
    songsBtn.addEventListener("click", async () => {
      try{
        await initDetectors("hands");
        await ensureCamera();
        showScreen("songs");
        state.prevTs = 0;
        if(!state.loopId) state.loopId = requestAnimationFrame(loop);
      }catch(err){
        console.error(err);
      }
    });
    songBack.addEventListener("click", () => {
      showScreen("result");
      state.hoveredSong = null;
      state.hoveredSongProgress = 0;
      updateSongCards();
    });
    songExit.addEventListener("click", () => {
      state.hoveredSong = null;
      state.hoveredSongProgress = 0;
      updateSongCards();
      try{
        window.top.location.href = "../index.html#home";
      }catch(err){
        window.location.href = "../index.html#home";
      }
    });

    window.addEventListener("resize", resizeCanvases);
    window.addEventListener("orientationchange", () => setTimeout(resizeCanvases, 250));

    buildPeonies();
    buildSongs();
    refreshPeonies();
    syncStepUi();
    updateResult();
    resizeCanvases();

    window.addEventListener("load", () => {
      setTimeout(() => ensureVisionRuntime(false).catch(()=>{}), 650);
    });

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      showToast("当前浏览器不支持摄像头调用，请使用 Chrome / Edge");
    }

  </script>
